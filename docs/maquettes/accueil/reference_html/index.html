<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cyclo Sport Pantin — App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wdth,wght@0,62..125,300..900&display=swap" rel="stylesheet" />
<style>
  :root{
    --csp-red:#EC1C2E;
    --csp-red-deep:#CE1626;
    --csp-blue:#46C2E6;
    --csp-blue-deep:#1FA9D2;
    --ink:#14171A;
    --ink-2:#3B4248;
    --muted:#828B92;
    --muted-2:#A7AEB4;
    --bg:#F4F5F3;
    --card:#FFFFFF;
    --line:rgba(20,23,26,0.08);
    --line-2:rgba(20,23,26,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Archivo',system-ui,sans-serif;
    background:#08090B;
    color:#F4F6F7;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  .display{
    font-variation-settings:'wdth' 118,'wght' 820;
    letter-spacing:-0.005em;
    line-height:1.0;
  }
  .display-wide{
    font-variation-settings:'wdth' 125,'wght' 880;
    letter-spacing:0.005em;
  }
  .csp-scroll{ scrollbar-width:none; -ms-overflow-style:none; }
  .csp-scroll::-webkit-scrollbar{ display:none; width:0; height:0; }
  .tap{ cursor:pointer; -webkit-tap-highlight-color:transparent; transition:transform .12s ease, box-shadow .18s ease, background .15s ease; }
  .tap:active{ transform:scale(0.975); }
  .screen-enter{ animation:none; }
  @keyframes screenIn{ from{ transform:translateX(20px);} to{ transform:translateX(0);} }
  @keyframes fadeUp{ from{ transform:translateY(9px);} to{ transform:translateY(0);} }
  @media (prefers-reduced-motion: no-preference){
    .screen-enter{ animation:screenIn .34s cubic-bezier(.22,.61,.36,1) both; }
    .fade-up{ animation:fadeUp .5s cubic-bezier(.22,.61,.36,1) both; }
    .row-stagger > *{ animation:fadeUp .5s cubic-bezier(.22,.61,.36,1) both; }
    .row-stagger > *:nth-child(1){ animation-delay:.04s; }
    .row-stagger > *:nth-child(2){ animation-delay:.10s; }
    .row-stagger > *:nth-child(3){ animation-delay:.16s; }
    .row-stagger > *:nth-child(4){ animation-delay:.22s; }
    .row-stagger > *:nth-child(5){ animation-delay:.28s; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="android-frame.jsx"></script>
  <script type="text/babel" src="bundle.jsx"></script>
</body>
</html>
